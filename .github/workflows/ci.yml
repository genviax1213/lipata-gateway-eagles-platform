name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  governance:
    name: Governance Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Internal Docs Stay Local
        run: |
          set -e
          prohibited='^(\.github/PULL_REQUEST_TEMPLATE\.md|docs/codex-session-scope-agreement\.md|docs/finance-workflows\.md|docs/software-engineering-standards\.md|ARCHITECTURE_IMPROVEMENTS\.md|BUILD_SPEC(\.DRAFT)?\.md|CLAUDE_CODE_ANALYSIS\.md|CONTINUITY_.*\.md|HOST_SECURITY_SCAN\.md|MODIFICATIONS_IMPROVEMENTS_REVISIONS\.md|SECURITY_IMPROVEMENTS\.md|lgec/)'
          if git ls-files | rg -n "$prohibited"; then
            echo "Internal-only docs are tracked. Move them to a local ignored path before merging."
            exit 1
          fi

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: none

      - name: Setup Composer Cache
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel Env
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          php artisan key:generate

      - name: Run Backend Tests
        run: composer test

      - name: Validate Backend Migrations
        run: php artisan migrate --force

  frontend:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build
