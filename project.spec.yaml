v: 1

sym:
  done: all_req_gates_green
  ev: cmd_evidence_required
  bb: backward_compat_by_default
  mp: minimal_patch
  rr: repo_reality_first
  sdlc: [inspect, plan, implement, verify, report]
  q: [lint, fmt, type, test, build_smoke, sec_audit]

r:
  id: prod_sw_eng_agent
  must:
    - orchestrate_by_master_prompt
    - strict_verification_gates
    - outputs:[changes, files, verify, residual_risk]

scope:
  use:
    - new_apps
    - existing_features
    - refactor_migrate
    - bugfix_regression_risk
  load:
    - governance.operating_manual
    - governance.codex_cli_rules
    - architecture.baseline
    - stack.one_relevant
    - repository.pattern
    - iteration.interactive
    - verification.pattern
    - steering.mid_execution_if_redirect
  discovery_opt:
    - research.app_workflow_analysis
    - research.platform_deconstruction
  in_req:
    - objective+measurable_success
    - in_scope/out_scope
    - runtime_env_constraints
    - integration_points_if_arch
    - required_verify_cmds

stack:
  pick: one_stack_profile_before_impl
  profiles: [react_laravel_mysql_sqlite, rust_tauri_arch, rust_tauri_ide_ai, rust_tauri_mysql, rust_tauri_sqlite]

architecture:
  layers: interface>application>domain>data_infra
  hard:
    - explicit_module_contracts+ownership
    - no_cross_layer_coupling
    - no_circular_deps
    - failure_strategy+observability_hooks
    - api_contract_changes_defined
    - integration_contract_tests_defined
    - migration_impact+rollback_path_documented
    - bb unless explicit_approval
    - no_breaking_api_or_schema_without_migration+rollback

governance:
  hard:
    - no_hardcoded_secrets_tokens_creds
    - mp
    - no_done_claim_without_executed_verification
    - preserve_repo_conventions(naming,arch,tooling)
    - no_done_if_any_required_check_fails
  op:
    - rr
    - prefer_surgical_diff_over_rewrite
    - concise_factual_comms
    - verify_claims_with_checks
    - stop_and_report_blockers_immediately
  non_compliance:
    - claim_done_while_skipping_test_lint_build
    - unrelated_file_changes_without_reason
    - non_requested_arch_drift

iteration_policy:
  model: small_verified_slices
  checkpoint: [slice_objective, files_touched, cmds_run, result_decision]
  hard:
    - no_batch_unrelated_changes
    - no_next_slice_with_unresolved_failures
    - validate_each_slice_before_next

repository_rules:
  req: [target_path, allowed, forbidden, arch_conventions]
  hard:
    - match_existing_style_abstractions_dependency_direction
    - respect_ownership_boundaries
    - avoid_incidental_refactor_unless_required
    - keep_ci_toolchain_compat
    - explain_each_changed_file_necessity
    - confirm_protected_areas_untouched

research_rules:
  trigger: [requirements_unclear, existing_product_reference]
  app_workflow_out:
    - personas_goals
    - journeys_state_transitions
    - feature_module_decomposition
    - dataflow+integration_assumptions
    - rebuild_route_component_blueprint
  platform_deconstruct_out:
    - arch_assumptions+trust_boundaries
    - route_ux_flow_map
    - feature_dependency_graph
    - candidate_domain_data_model
    - event_flow(sync_async)
    - phased_rebuild_plan+risk
  hard:
    - implementation_relevance_over_marketing
    - separate_observed_vs_inferred

stack_constraints:
  react_laravel_mysql_sqlite:
    arch:
      - FE_BE_boundary_versioned_api
      - laravel_owns_auth_policy_rules_persistence
      - react_owns_render_state_ux
      - schema_via_migrations_seeders
    constraints:
      - api_prefix:/api/v1
      - react>=18+typed_api_layer
      - mysql_primary;sqlite_tests_local
      - auth_explicit:sanctum_or_jwt
    sec_rel: [validate_all_writes, centralized_error_envelope, rate_limit_sensitive]
    verify: [php_artisan_test, npm_test, npm_run_build, php_artisan_migrate_fresh_seed]

  rust_tauri_arch:
    arch: [strong_ipc_contract, modular_domain_service_repo, ui_safe_error_taxonomy]
    safety: [no_unsafe_unless_justified, validate_inputs_at_cmd_boundary, least_privilege_system_access]
    verify: [cargo_fmt_check, cargo_clippy_D_warnings, cargo_test, tauri_build_smoke]

  rust_tauri_ide_ai:
    constraints: [plugin_capable_arch, stable_extension_points, perf_sensitive_cmd_exec]
    hard: [preserve_plugin_api_compat, strict_cmd_contracts, deterministic_ide_ops]
    verify: [cargo_check, cargo_test, cargo_clippy_D_warnings, cargo_build_release]

  rust_tauri_mysql:
    data: [async_db_pooling, retry_transient_db_net_failures, env_secrets_only]
    arch: [repo_abstraction_isolates_mysql, service_owns_transactions, ui_consumes_ipc_dtos_only]
    verify: [mysql_integration_tests, failure_path_tests, cargo_clippy_D_warnings, cargo_test]

  rust_tauri_sqlite:
    data: [prepared_or_typed_queries, versioned_migrations, repo_only_db_access]
    reliability: [transaction_boundaries, schema_integrity_constraints, backup_export_strategy]
    verify: [migration_up_down_tests, in_memory_sqlite_tests, cmd_repo_integration_tests, cargo_clippy_D_warnings, cargo_test]

steering_rules:
  trigger: scope_or_direction_change_mid_execution
  hard:
    - pause_current_execution
    - preserve_verified_components_when_possible
    - rebaseline_plan_before_edits
    - continue_only_from_last_validated_state
    - rerun_all_impacted_checks
  steering_payload: [new_direction, keep_validated_artifacts, replace_refactor_areas, new_constraints]

verification_rules:
  matrix:
    static: [lint, formatting, type_checks]
    behavioral: [unit, integration, e2e_if_applicable]
    runtime: [build_package, startup_smoke]
    security: [dependency_audit, secret_config_checks]
  hard:
    - ev
    - new_behavior_requires_tests
    - bugfix_requires_regression_coverage
    - failing_checks_must_be_fixed_or_explicitly_waived_with_reason
  completion_gate:
    - lint_pass
    - tests_pass
    - build_or_package_pass
    - security_sensitive_changes_reviewed
    - required_docs_config_updates_included

invariants:
  arch: [layers_explicit, contracts_and_ownership_explicit, bb]
  exec: [sdlc, incremental_checkpointed_delivery, no_done_without_verification]
  repo: [respect_conventions_and_dep_direction, minimal_diff_surface, no_unrelated_changes]
  mobile:
    - internal_mobile_scope(finance+announcements_only)
    - personal_member_mobile_shell(my_contributions+announcements)
    - elevated_accounts_blocked_from_mobile(bootstrap+admin+officer+secretary+membership_chairman+treasurer+auditor)
    - no_chat_feature_until_explicit_reapproval
  sec:
    - no_secret_material_in_code
    - env_secret_management
    - portal_session_security_default(inactivity_logout_30m+single_active_session+forced_logout_notice)
  finance:
    - finance_accounts_first_class(bank+gcash+cash_on_hand)
    - opening_balances_first_class(bank+gcash+cash_on_hand)
    - contributions_immutable_after_save
    - expenses_immutable_after_save
    - opening_balances_immutable_after_save
    - future_dated_opening_balances_do_not_affect_current_balance
    - corrections_via_reversal_entries_only
    - opening_balance_effective_date_required
    - remarks_required_on_all_finance_writes
    - expense_support_reference_tracking
    - expense_approval_reference_tracking
    - admin_finance_default_view_only
    - treasurer_finance_input_and_reversal(contributions+expenses)
    - auditor_finance_read_compliance_only(contributions+expenses+findings)
    - treasurer_reporting_preview_display_only
    - auditor_note_findings_visible_to_treasurer
    - live_finance_reporting_covers_income_expenses_accounts

execution_protocol:
  preflight:
    - load_prompt_chain_in_order
    - gather_inputs(objective, scope, constraints, verify_cmds)
    - inspect_repo_structure_patterns_ownership
    - restate_assumptions_acceptance_criteria_scope
  loop: [inspect_relevant_files, plan_minimal_changes, implement_incrementally, verify_each_meaningful_increment, iterate_until_green]
  blocker: [stop, report_blocker_with_evidence, propose_best_next_action]
  close:
    - run_required_verify_cmds
    - report_pass_fail_per_cmd
    - report_files_changed
    - report_residual_risk_followups
    - declare_done_only_if_done
